- name: Gary Koo
  bio: Gary is a technology-focused attorney with experience in patent prosecution, intellectual property strategy, legal technology, artificial intelligence, and product development. He helps clients and stakeholders protect, develop, and commercialize innovation across software, AI, cloud computing, cybersecurity, data management, image processing, control systems, mechanical systems, and semiconductor technologies. <br><br> Gary began his career as a Patent Examiner at the U.S. Patent and Trademark Office, examining database, software, data processing, and data storage-related patent applications. He later practiced as a patent attorney in the United States and Japan, drafting and prosecuting patent applications and counseling clients on portfolio management and IP strategy. <BR><BR> Gary has also worked in-house with technology companies at the intersection of law, engineering, product, and business strategy. At PreAct Technologies, he developed and executed a global IP strategy, conducted invention harvesting sessions, managed outside patent counsel, and advised on technology agreements and commercialization issues. He has also served as Chief Product Officer for an AI legal technology company. <BR><BR> Gary holds a J.D. from DePaul University College of Law and a B.S. in Computer Science from Illinois Institute of Technology.
